<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TOPIK 1級 634語テスト</title>
<style>
:root {
  --bg:#f5f6f8; --card:#fff; --text:#20242b; --muted:#68707d;
  --line:#dfe3e8; --accent:#4d67d8; --good:#16834f; --bad:#c73e3e;
}
* { box-sizing:border-box; }
body {
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Noto Sans KR",sans-serif;
}
main { width:min(760px,100%); margin:auto; padding:18px 14px 40px; }
h1 { font-size:1.35rem; margin:4px 0 6px; }
.sub { color:var(--muted); font-size:.9rem; margin-bottom:16px; }
.card {
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.035);
}
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
label { display:block; font-size:.86rem; color:var(--muted); margin-bottom:5px; }
select,input[type=number],input[type=text] {
  width:100%; min-height:44px; border:1px solid var(--line); border-radius:10px;
  padding:9px 11px; font-size:16px; background:#fff; color:var(--text);
}
.row { display:flex; gap:9px; align-items:center; flex-wrap:wrap; }
.check { display:flex; gap:7px; align-items:center; color:var(--text); font-size:.94rem; }
button {
  border:0; border-radius:10px; padding:11px 15px; font-size:15px; font-weight:650;
  cursor:pointer; min-height:44px;
}
.primary { background:var(--accent); color:white; }
.secondary { background:#edf0f6; color:var(--text); }
.danger { background:#f9eaea; color:var(--bad); }
button:disabled { opacity:.48; cursor:not-allowed; }
.hidden { display:none !important; }
.topbar { display:flex; justify-content:space-between; gap:10px; align-items:center; }
.progress { color:var(--muted); font-size:.9rem; }
.question {
  text-align:center; font-size:clamp(2rem,9vw,3.8rem); font-weight:750;
  line-height:1.25; padding:23px 8px 18px; overflow-wrap:anywhere;
}
.prompt { text-align:center; color:var(--muted); margin-top:2px; }
.choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.choice {
  background:#f7f8fb; color:var(--text); border:1px solid var(--line);
  min-height:58px; text-align:left; overflow-wrap:anywhere;
}
.choice.correct { background:#e8f6ef; border-color:#79c69e; color:#0d6b3c; }
.choice.wrong { background:#fceeee; border-color:#dc9696; color:#a72c2c; }
.feedback { min-height:48px; margin-top:12px; font-weight:650; line-height:1.5; }
.good {
  color:var(--good);
  background:#e8f6ef;
  border:2px solid #79c69e;
  border-radius:12px;
  padding:12px 14px;
}
.bad {
  color:#a90000;
  background:#ffe2e2;
  border:3px solid #d60000;
  border-radius:12px;
  padding:14px 16px;
  font-size:1.1rem;
  font-weight:800;
  box-shadow:0 0 0 3px rgba(214,0,0,.08);
}
.star {
  background:transparent; font-size:28px; padding:3px 8px; min-height:auto;
  color:#9aa1ab;
}
.star.on { color:#e2a500; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.stat { text-align:center; background:#f7f8fb; border-radius:10px; padding:9px 4px; }
.stat b { display:block; font-size:1.15rem; }
.stat span { color:var(--muted); font-size:.76rem; }
.answer-row { display:flex; gap:8px; margin-top:14px; }
.answer-row input { flex:1; }
.small { font-size:.82rem; color:var(--muted); }
.result-big { font-size:2rem; font-weight:800; text-align:center; margin:10px 0; }
@media (max-width:560px) {
  .grid,.choices { grid-template-columns:1fr; }
  .stats { grid-template-columns:repeat(2,1fr); }
  main { padding:12px 10px 28px; }
  .card { padding:13px; border-radius:12px; }
}
</style>

<div style="max-width:900px;margin:12px auto;padding:10px 14px;border-radius:12px;background:#fff8d8;border:1px solid #ead06c;font-size:14px;line-height:1.5">
  🌱 <strong>TOPIK 1級・試作版</strong><br>
  アップロードされた一覧と1671語データを照合し、一致した634語だけを収録しています。
  元の1671語版とは別ページなので、元のアプリや学習記録には影響しません。
</div>

<main>
  <h1>TOPIK 1級 634語テスト</h1>
  <div class="sub">データはこの端末のブラウザ内だけに保存されます。</div>

  <section id="setup" class="card">
    <div class="grid">
      <div>
        <label for="direction">出題方向</label>
        <select id="direction">
          <option value="ko-ja">韓国語 → 日本語</option>
          <option value="ja-ko">日本語 → 韓国語</option>
          <option value="mix">ランダムに混ぜる</option>
        </select>
      </div>
      <div>
        <label for="mode">問題形式</label>
        <select id="mode">
          <option value="choice">4択</option>
          <option value="input">入力問題</option>
          <option value="mix">4択・入力を混ぜる</option>
        </select>
      </div>
      <div>
        <label for="count">問題数</label>
        <input id="count" type="number" min="1" max="634" value="20">
      </div>
      <div>
        <label for="startNo">開始番号</label>
        <input id="startNo" type="number" min="1" max="634" value="1">
      </div>
      <div>
        <label for="range">出題範囲</label>
        <select id="range">
          <option value="all">全1671語</option>
          <option value="wrong">間違えた単語だけ</option>
          <option value="favorite">お気に入りだけ</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <label class="check"><input id="randomize" type="checkbox" checked> ランダム出題</label>
    </div>
    <div class="row" style="margin-top:14px">
      <button id="startBtn" class="primary">テスト開始</button>
      <button id="resetStatsBtn" class="danger">記録をリセット</button>
    </div>
    <div id="rangeNote" class="small" style="margin-top:10px"></div>
  </section>

  <section class="card">
    <div class="stats">
      <div class="stat"><b id="allAttempts">0</b><span>累計回答</span></div>
      <div class="stat"><b id="allCorrect">0</b><span>累計正解</span></div>
      <div class="stat"><b id="allRate">0%</b><span>正答率</span></div>
      <div class="stat"><b id="favCount">0</b><span>お気に入り</span></div>
    </div>
  </section>

  <section id="quiz" class="card hidden">
    <div class="topbar">
      <div id="progress" class="progress"></div>
      <div class="row" style="gap:4px">
        <button id="speakBtn" class="secondary" title="韓国語を読み上げ">🔊 音声</button>
        <button id="favoriteBtn" class="star" title="お気に入り">☆</button>
      </div>
    </div>
    <div id="prompt" class="prompt"></div>
    <div id="question" class="question"></div>
    <div id="choices" class="choices"></div>
    <div id="inputArea" class="answer-row hidden">
      <input id="answerInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="答えを入力">
      <button id="submitBtn" class="primary">回答</button>
    </div>
    <div id="feedback" class="feedback"></div>
    <div class="row">
      <button id="dontKnowBtn" class="secondary">分からない</button>
      <button id="nextBtn" class="primary hidden">次へ</button>
      <button id="stopBtn" class="secondary">終了</button>
    </div>
  </section>

  <section id="result" class="card hidden">
    <h2 style="margin-top:0">結果</h2>
    <div id="resultBig" class="result-big"></div>
    <div id="resultText" style="text-align:center"></div>
    <div class="row" style="justify-content:center;margin-top:16px">
      <button id="retryWrongBtn" class="primary">今回の間違いを復習</button>
      <button id="backBtn" class="secondary">設定に戻る</button>
    </div>
  </section>
</main>

const KEY = "topik1_634_trial_v1";
let state = loadState();
let session = null;

let audioContext = null;
let soundEnabled = true;

async function getReadyAudioContext() {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx || !soundEnabled) return null;
  if (!audioContext) audioContext = new AudioCtx();

  if (audioContext.state === "suspended") {
    try {
      await audioContext.resume();
    } catch (e) {
      console.warn("Audio resume failed", e);
      return null;
    }
  }
  return audioContext;
}

function scheduleTone(ctx, frequency, startTime, duration, volume=0.18, type="sine") {
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();
  oscillator.type = type;
  oscillator.frequency.setValueAtTime(frequency, startTime);
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  oscillator.connect(gain);
  gain.connect(ctx.destination);
  oscillator.start(startTime);
  oscillator.stop(startTime + duration + 0.03);
}

async function unlockAudio() {
  const ctx = await getReadyAudioContext();
  if (!ctx) return false;
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.value = 0.0001;
  oscillator.connect(gain);
  gain.connect(ctx.destination);
  oscillator.start();
  oscillator.stop(ctx.currentTime + 0.02);
  return true;
}

async function playCorrectSound() {
  const ctx = await getReadyAudioContext();
  if (!ctx) return;
  const now = ctx.currentTime + 0.02;
  scheduleTone(ctx, 659.25, now, 0.16, 0.18, "sine");
  scheduleTone(ctx, 783.99, now + 0.12, 0.18, 0.18, "sine");
  scheduleTone(ctx, 1046.50, now + 0.24, 0.30, 0.20, "sine");
}

async function playWrongSound() {
  const ctx = await getReadyAudioContext();
  if (!ctx) return;
  const now = ctx.currentTime + 0.02;
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();
  oscillator.type = "triangle";
  oscillator.frequency.setValueAtTime(230, now);
  oscillator.frequency.exponentialRampToValueAtTime(120, now + 0.34);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.19, now + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.38);
  oscillator.connect(gain);
  gain.connect(ctx.destination);
  oscillator.start(now);
  oscillator.stop(now + 0.40);
}


function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    return {
      attempts: Number(s?.attempts)||0,
      correct: Number(s?.correct)||0,
      wrong: Array.isArray(s?.wrong) ? s.wrong : [],
      favorites: Array.isArray(s?.favorites) ? s.favorites : []
    };
  } catch(e) {
    return {attempts:0,correct:0,wrong:[],favorites:[]};
  }
}
function saveState() { localStorage.setItem(KEY, JSON.stringify(state)); renderStats(); }
function byId(id) { return document.getElementById(id); }
function secureRandomInt(maxExclusive) {
  if(maxExclusive <= 1) return 0;
  if(window.crypto && window.crypto.getRandomValues) {
    const limit = Math.floor(0x100000000 / maxExclusive) * maxExclusive;
    const buf = new Uint32Array(1);
    let value;
    do {
      window.crypto.getRandomValues(buf);
      value = buf[0];
    } while(value >= limit);
    return value % maxExclusive;
  }
  return Math.floor(Math.random() * maxExclusive);
}
function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--) {
    const j=secureRandomInt(i+1);
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}
function unique(arr) { return [...new Set(arr)]; }
function normalize(s) {
  return String(s??"").trim().toLowerCase()
    .replace(/[　\s]+/g,"")
    .replace(/[、，,。．.・／/（）()「」『』【】［］\[\]～~?？!！:：;；]/g,"");
}
function acceptedAnswers(text) {
  const parts = String(text).split(/[、，,／/]/).map(normalize).filter(Boolean);
  return unique([normalize(text), ...parts]);
}
function renderStats() {
  byId("allAttempts").textContent=state.attempts;
  byId("allCorrect").textContent=state.correct;
  byId("allRate").textContent=state.attempts ? Math.round(state.correct/state.attempts*100)+"%" : "0%";
  byId("favCount").textContent=state.favorites.length;
  updateRangeNote();
}
function updateRangeNote() {
  const r=byId("range").value;
  const startNo=Math.max(1,Math.min(WORDS.length,Number(byId("startNo")?.value)||1));
  let pool;
  if(r==="wrong") {
    const set=new Set(state.wrong);
    pool=WORDS.filter(w=>set.has(w.no) && w.no>=startNo);
  } else if(r==="favorite") {
    const set=new Set(state.favorites);
    pool=WORDS.filter(w=>set.has(w.no) && w.no>=startNo);
  } else {
    pool=WORDS.filter(w=>w.no>=startNo);
  }
  const order=byId("randomize")?.checked ? "ランダム" : "番号順";
  byId("rangeNote").textContent=`開始：No.${startNo}／対象：${pool.length}語／出題順：${order}`;
}
function getPool() {
  const r=byId("range").value;
  if(r==="wrong") {
    const set=new Set(state.wrong);
    return WORDS.filter(w=>set.has(w.no));
  }
  if(r==="favorite") {
    const set=new Set(state.favorites);
    return WORDS.filter(w=>set.has(w.no));
  }
  return [...WORDS];
}
function applyStartNumber(pool) {
  const startNo=Math.max(1,Math.min(WORDS.length,Number(byId("startNo").value)||1));
  byId("startNo").value=startNo;
  return pool.filter(w=>w.no>=startNo);
}
function startQuiz(customNos=null) {
  let pool;
  if(customNos) {
    const set=new Set(customNos);
    pool=WORDS.filter(w=>set.has(w.no));
  } else {
    pool=applyStartNumber(getPool());
  }

  if(!pool.length) {
    alert(byId("range").value==="wrong" ? "指定した開始番号以降に、間違えた単語がありません。" : "指定した開始番号以降に対象となる単語がありません。");
    return;
  }
  const requested=Math.max(1, Math.min(Number(byId("count").value)||20, pool.length));
  if(byId("randomize").checked) pool=shuffle(pool);
  else pool=pool.sort((a,b)=>a.no-b.no);
  pool=pool.slice(0,requested);

  session={
    words:pool,index:0,correct:0,answered:false,wrongNos:[],
    direction:byId("direction").value,mode:byId("mode").value,
    randomized:byId("randomize").checked
  };
  byId("setup").classList.add("hidden");
  byId("result").classList.add("hidden");
  byId("quiz").classList.remove("hidden");
  showQuestion();
}
function currentDirection() {
  return session.direction==="mix" ? (Math.random()<.5?"ko-ja":"ja-ko") : session.direction;
}
function currentMode() {
  return session.mode==="mix" ? (Math.random()<.5?"choice":"input") : session.mode;
}
function showQuestion() {
  session.answered=false;
  session.dir=currentDirection();
  session.qmode=currentMode();
  const w=session.words[session.index];
  byId("progress").textContent=`${session.index+1} / ${session.words.length}　No.${w.no}　${session.randomized ? "🎲ランダム" : "番号順"}`;
  byId("prompt").textContent=session.dir==="ko-ja" ? "日本語の意味は？" : "韓国語では？";
  byId("question").textContent=session.dir==="ko-ja" ? w.ko : w.ja;
  byId("feedback").textContent="";
  byId("feedback").className="feedback";
  byId("nextBtn").classList.add("hidden");
  byId("dontKnowBtn").disabled=false;
  byId("choices").innerHTML="";
  byId("answerInput").value="";
  updateStar();

  if(session.qmode==="choice") {
    byId("choices").classList.remove("hidden");
    byId("inputArea").classList.add("hidden");
    const correct=session.dir==="ko-ja" ? w.ja : w.ko;
    const isPredicate=w.ko.endsWith("다");
    let candidateWords=WORDS.filter(x=>x.no!==w.no);
    if(isPredicate) candidateWords=candidateWords.filter(x=>x.ko.endsWith("다"));
    const others=shuffle(candidateWords)
      .map(x=>session.dir==="ko-ja"?x.ja:x.ko)
      .filter((v,i,a)=>v!==correct && a.indexOf(v)===i)
      .slice(0,3);
    shuffle([correct,...others]).forEach(text=>{
      const b=document.createElement("button");
      b.className="choice"; b.textContent=text;
      b.onclick=async()=>{ await unlockAudio(); answer(text, b); };
      byId("choices").appendChild(b);
    });
  } else {
    byId("choices").classList.add("hidden");
    byId("inputArea").classList.remove("hidden");
    setTimeout(()=>byId("answerInput").focus(),50);
  }
}
function answer(value, button=null) {
  if(session.answered) return;
  session.answered=true;
  const w=session.words[session.index];
  const correctText=session.dir==="ko-ja" ? w.ja : w.ko;
  const answers=acceptedAnswers(correctText);
  const ok=answers.includes(normalize(value));

  state.attempts++;
  if(ok) {
    state.correct++; session.correct++;
    state.wrong=state.wrong.filter(n=>n!==w.no);
    byId("feedback").textContent="正解！";
    byId("feedback").className="feedback good";
    playCorrectSound();
  } else {
    if(!state.wrong.includes(w.no)) state.wrong.push(w.no);
    if(!session.wrongNos.includes(w.no)) session.wrongNos.push(w.no);
    byId("feedback").textContent=`不正解　正解：${correctText}`;
    byId("feedback").className="feedback bad";
    playWrongSound();
  }
  saveState();

  if(session.qmode==="choice") {
    [...byId("choices").children].forEach(b=>{
      b.disabled=true;
      if(normalize(b.textContent)===normalize(correctText)) b.classList.add("correct");
    });
    if(button && !ok) button.classList.add("wrong");
  } else {
    byId("answerInput").disabled=true; byId("submitBtn").disabled=true;
  }
  byId("nextBtn").textContent=session.index===session.words.length-1 ? "結果を見る" : "次へ";
  byId("nextBtn").classList.remove("hidden");
}
function answerDontKnow() {
  if(!session || session.answered) return;
  const w=session.words[session.index];
  const correctText=session.dir==="ko-ja" ? w.ja : w.ko;
  answer("__DONT_KNOW__");
  byId("feedback").textContent=`分からない　正解：${correctText}`;
  byId("feedback").className="feedback bad";
}
function nextQuestion() {
  if(!session.answered) return;
  if(session.index>=session.words.length-1) return finishQuiz();
  session.index++;
  byId("answerInput").disabled=false; byId("submitBtn").disabled=false;
  showQuestion();
}
function finishQuiz() {
  byId("quiz").classList.add("hidden");
  byId("result").classList.remove("hidden");
  const total=session.words.length;
  const rate=Math.round(session.correct/total*100);
  byId("resultBig").textContent=`${session.correct} / ${total}（${rate}%）`;
  byId("resultText").textContent=`今回の間違い：${session.wrongNos.length}語`;
  byId("retryWrongBtn").disabled=session.wrongNos.length===0;
}
function backToSetup() {
  byId("quiz").classList.add("hidden");
  byId("result").classList.add("hidden");
  byId("setup").classList.remove("hidden");
  session=null; renderStats();
}
function speakCurrentWord() {
  if(!session) return;
  if(!("speechSynthesis" in window)) {
    alert("このブラウザでは音声読み上げに対応していません。");
    return;
  }
  const word=session.words[session.index].ko;
  window.speechSynthesis.cancel();
  const utterance=new SpeechSynthesisUtterance(word);
  utterance.lang="ko-KR";
  utterance.rate=0.82;
  utterance.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const koreanVoice=voices.find(v=>String(v.lang).toLowerCase().startsWith("ko"));
  if(koreanVoice) utterance.voice=koreanVoice;
  window.speechSynthesis.speak(utterance);
}
function toggleFavorite() {
  if(!session) return;
  const no=session.words[session.index].no;
  if(state.favorites.includes(no)) state.favorites=state.favorites.filter(n=>n!==no);
  else state.favorites.push(no);
  saveState(); updateStar();
}
function updateStar() {
  const no=session.words[session.index].no;
  const on=state.favorites.includes(no);
  byId("favoriteBtn").textContent=on?"★":"☆";
  byId("favoriteBtn").classList.toggle("on",on);
}
byId("startBtn").onclick=async()=>{ await unlockAudio(); startQuiz(); };
byId("speakBtn").onclick=speakCurrentWord;
byId("dontKnowBtn").onclick=answerDontKnow;
byId("submitBtn").onclick=async()=>{ await unlockAudio(); answer(byId("answerInput").value); };
byId("answerInput").addEventListener("keydown",e=>{if(e.key==="Enter") {
  if(!session.answered) answer(byId("answerInput").value); else nextQuestion();
}});
byId("nextBtn").onclick=nextQuestion;
byId("stopBtn").onclick=()=>{ if(confirm("テストを終了しますか？")) finishQuiz(); };
byId("favoriteBtn").onclick=toggleFavorite;
byId("backBtn").onclick=backToSetup;
byId("retryWrongBtn").onclick=()=>startQuiz(session.wrongNos);
byId("range").onchange=updateRangeNote;
byId("startNo").oninput=updateRangeNote;
byId("randomize").onchange=updateRangeNote;
byId("resetStatsBtn").onclick=()=>{
  if(confirm("正答率・間違い・お気に入りの記録をすべて消しますか？")) {
    state={attempts:0,correct:0,wrong:[],favorites:[]}; saveState();
  }
};
renderStats();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(console.error);
  });
}
</script>

</body>
</html>
